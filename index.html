<script>
  const $ = (id) => document.getElementById(id);

  // ✅ ใช้ Vercel API Proxy (ตัด CORS)
  const API = "/api/stock";

  // ✅ บังคับให้เป็น "ตัวเลขเท่านั้น" (กัน paste/คีย์บอร์ดอื่น)
  function digitsOnly(el){
    el.value = (el.value || '').replace(/\D+/g, '');
  }
  ['barcode','qty'].forEach(id => {
    const el = $(id);
    el.addEventListener('input', () => digitsOnly(el));
  });

  /* =========================
   *  ✅ CAMERA BARCODE SCANNER
   * ========================= */
  let stream = null;
  let detector = null;
  let scanning = false;

  async function startScan() {
    if (!('BarcodeDetector' in window)) {
      setStatus('This browser does not support camera barcode scanning.', 'err');
      return;
    }

    try {
      setStatus('Opening camera...', '');
      detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','qr_code'] });

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });

      const video = $('preview');
      video.srcObject = stream;
      video.style.display = 'block';
      await video.play();

      scanning = true;
      requestAnimationFrame(scanFrame);
      setStatus('Scanning... aim at the barcode', '');

    } catch (err) {
      setStatus('Camera error: ' + (err?.message || err), 'err');
    }
  }

  async function scanFrame() {
    if (!scanning) return;

    const video = $('preview');
    try {
      const barcodes = await detector.detect(video);
      if (barcodes && barcodes.length) {
        const code = String(barcodes[0].rawValue || '').trim();
        if (code) {
          $('barcode').value = code;
          digitsOnly($('barcode'));
          stopScan();
          setStatus('Scanned ✅', 'ok');
          return;
        }
      }
    } catch (err) {
      console.log(err);
    }

    requestAnimationFrame(scanFrame);
  }

  function stopScan() {
    scanning = false;
    const video = $('preview');

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    if (video) {
      video.pause();
      video.srcObject = null;
      video.style.display = 'none';
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopScan();
  });

  /* =========================
   *  HELPERS (NEW)
   * ========================= */
  async function fetchJson(url, options) {
    const res = await fetch(url, options);
    const text = await res.text();

    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("API not JSON: " + text.slice(0, 160)); }

    if (!res.ok) {
      throw new Error(data?.error || ("HTTP " + res.status));
    }
    return data;
  }

  /* =========================
   *  ORIGINAL LOGIC
   * ========================= */
  function applyTypeRules() {
    const t = $('type').value;
    $('whFrom').disabled = false;
    $('whTo').disabled = false;

    if (['IN_PURCHASE','IN_RETURN','ADJ_PLUS'].includes(t)) {
      $('whFrom').value = '';
      $('whFrom').disabled = true;
    } else if (['OUT_SALE','OUT_LOAN','ADJ_MINUS'].includes(t)) {
      $('whTo').value = '';
      $('whTo').disabled = true;
    }
  }
  $('type').addEventListener('change', applyTypeRules);

  function setStatus(msg, kind) {
    const el = $('status');
    el.className = 'status ' + (kind === 'ok' ? 'ok' : kind === 'err' ? 'err' : '');
    el.textContent = msg || '';
  }

  function clearForm() {
    stopScan();
    $('barcode').value = '';
    $('qty').value = '';
    $('note').value = '';
    $('barcode').focus();
    setStatus('');
  }

  function validate(payload) {
    if (!payload.barcode) return 'Please scan/enter barcode';
    if (!payload.type) return 'Please select Type';

    const q = Number(payload.qty);
    if (!Number.isFinite(q) || q <= 0) return 'Qty must be > 0';

    const t = payload.type;
    const OWN = ['BKK','CHB'];

    if (['IN_PURCHASE','IN_RETURN','ADJ_PLUS'].includes(t)) {
      if (!OWN.includes(payload.whTo)) return `${t}: Choose WH_To (BKK/CHB)`;
    }
    if (['OUT_SALE','OUT_LOAN','ADJ_MINUS'].includes(t)) {
      if (!OWN.includes(payload.whFrom)) return `${t}: Choose WH_From (BKK/CHB)`;
    }
    if (t === 'TRANSFER') {
      if (!OWN.includes(payload.whFrom) || !OWN.includes(payload.whTo)) return 'TRANSFER: Choose both WH_From and WH_To';
      if (payload.whFrom === payload.whTo) return 'TRANSFER: WH_From cannot equal WH_To';
    }
    return '';
  }

  async function submitEntry() {
    applyTypeRules();
    stopScan();

    const payload = {
      barcode: $('barcode').value.trim(),
      type: $('type').value,
      whFrom: $('whFrom').value,
      whTo: $('whTo').value,
      qty: $('qty').value,
      note: $('note').value.trim(),
    };

    const err = validate(payload);
    if (err) return setStatus(err, 'err');

    setStatus('Saving...');

    try {
      // ✅ POST ไปที่ Vercel proxy แทน Apps Script ตรง ๆ
      const data = await fetchJson(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!data.ok) throw new Error(data.error || 'Save failed');

      setStatus('Saved ✅', 'ok');
      $('barcode').value = '';
      $('qty').value = '';
      $('note').value = '';
      $('barcode').focus();
      refresh();
    } catch (e) {
      setStatus('Error: ' + (e?.message || e), 'err');
    }
  }

  async function refresh() {
    $('badge').textContent = 'Loading...';
    try {
      // ✅ GET ผ่าน Vercel proxy
      const data = await fetchJson(`${API}?fn=getRecentEntries&limit=30`, { method: "GET" });
      renderTable(data);
    } catch (e) {
      $('tableWrap').textContent = 'Error loading: ' + (e?.message || e);
      $('badge').textContent = 'Error';
    }
  }

  function renderTable(data) {
    const headers = data.headers || [];
    const rows = data.rows || [];
    $('badge').textContent = rows.length ? `${rows.length} rows` : '0 rows';

    if (!rows.length) {
      $('tableWrap').textContent = 'No movements yet.';
      return;
    }

    let html = '<table><thead><tr>';
    headers.forEach(h => html += `<th>${escapeHtml(String(h))}</th>`);
    html += '</tr></thead><tbody>';

    rows.forEach(r => {
      html += '<tr>';
      r.forEach(c => html += `<td>${escapeHtml(String(c ?? ''))}</td>`);
      html += '</tr>';
    });

    html += '</tbody></table>';
    $('tableWrap').innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[m]));
  }

  window.onload = () => {
    applyTypeRules();
    $('barcode').focus();
    refresh();
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitEntry();
  });
</script>
